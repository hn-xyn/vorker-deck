<!-- review zoom control — shrinks the slide for easier overview -->
<div id="zoomctl" aria-label="Slide zoom">
  <button type="button" data-z="out" title="Zoom out">&minus;</button>
  <span id="zoomval">100%</span>
  <button type="button" data-z="in" title="Zoom in">+</button>
  <button type="button" data-z="fit" title="Fit to screen">Fit</button>
</div>
<style>
  #zoomctl {
    position: fixed; top: 16px; right: 16px; z-index: 30;
    display: flex; align-items: center; gap: 2px;
    padding: 4px; border-radius: 999px;
    background: rgba(20,20,26,0.78); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.10);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    user-select: none; opacity: 0.35; transition: opacity .18s;
  }
  #zoomctl:hover { opacity: 1; }
  #zoomctl button {
    appearance: none; border: 0; cursor: pointer; color: #fff;
    background: transparent; border-radius: 999px;
    width: 26px; height: 26px; font-size: 15px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
  }
  #zoomctl button[data-z="fit"] { width: auto; padding: 0 11px; font-size: 11px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: rgba(255,255,255,0.7); }
  #zoomctl button:hover { background: rgba(255,255,255,0.14); }
  #zoomval {
    min-width: 44px; text-align: center; color: #fff;
    font-size: 12px; font-variant-numeric: tabular-nums; font-weight: 500;
  }
</style>
<script>
  (function () {
    var KEY = 'vorkerDeck.zoom';
    var MIN = 0.3, MAX = 1, STEP = 0.1;
    var deck = document.querySelector('deck-stage');
    var val = document.getElementById('zoomval');
    function clamp(z) { return Math.min(MAX, Math.max(MIN, Math.round(z * 10) / 10)); }
    function read() { var v = parseFloat(localStorage.getItem(KEY)); return (isFinite(v) && v > 0) ? clamp(v) : 1; }
    function apply(z) {
      z = clamp(z);
      if (z >= 1) deck.removeAttribute('zoom'); else deck.setAttribute('zoom', z);
      val.textContent = Math.round(z * 100) + '%';
      try { localStorage.setItem(KEY, z); } catch (e) {}
    }
    document.getElementById('zoomctl').addEventListener('click', function (e) {
      var b = e.target.closest('button'); if (!b) return;
      var cur = read(), z = b.dataset.z === 'in' ? cur + STEP : b.dataset.z === 'out' ? cur - STEP : 1;
      apply(z);
    });
    apply(read());
  })();
</script>
<script src="deck-stage.js"></script>
<script type="text/babel" src="cover.jsx"></script>
<script type="text/babel" src="meet-vorker.jsx"></script>
